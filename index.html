<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./img/nacional.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css">
  <title>Hub - Nacional</title>
</head>

<body>
  <!-- TELA DE LOGIN MANTIDA -->
  <div id="auth-screen" class="overlay">
    <div class="modal" id="login-box">
      <h2>Login</h2>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="••••••••">
      </div>
      <button class="btn primary" id="btn-login" style="width: 100%; margin-top: 10px;" onclick="fazerLogin()">Entrar no Sistema</button>
      <div class="auth-link">Não tem uma conta? <a href="#" onclick="toggleAuth('register'); return false;">Registre-se</a></div>
    </div>

    <div class="modal hidden" id="register-box">
      <h2>Registre-se</h2>
      <div class="field">
        <label>Nome Completo</label>
        <input type="text" id="reg-nome" placeholder="Como quer ser chamado?">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="reg-email" placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="reg-senha" placeholder="Mínimo de 6 caracteres">
      </div>
      <button class="btn primary" id="btn-register" style="width: 100%; margin-top: 10px;" onclick="fazerRegistro()">Cadastrar</button>
      <div class="auth-link">Já possui uma conta? <a href="#" onclick="toggleAuth('login'); return false;">Faça login</a></div>
    </div>
  </div>

  <!-- CONTEÚDO DO HUB -->
  <div id="app-content">
    <header>
      <div style="display:flex; align-items:center; gap:10px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <h1>Hub - Nacional</h1>
      </div>
      <span id="header-date"></span>
      
      <button class="btn sm icon-btn" onclick="toggleDarkMode()" style="margin-left: 15px;" title="Alternar Modo Escuro">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="theme-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
      <button class="btn sm" onclick="fazerLogout()" style="margin-left: 10px;">Sair</button>
    </header>

    <div class="container">
      <h2>O que deseja fazer hoje?</h2>

      <div class="hub-grid">
        <!-- CARD DO ESTOQUE -->
        <a href="estoque.html" class="hub-card">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2"/><path d="M3 8h18v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8z"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
          <h3>Gerenciar Estoque</h3>
          <p>Controle de entradas, saídas, itens em falta e inventário.</p>
        </a>

        <!-- EXEMPLO DE UM NOVO CARD FUTURO -->
        <a href="pcs.html" class="hub-card">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <h3>PCs do Escritório</h3>
          <p>Gestão de hardware, números de séries e funcionários vinculados.</p>
        </a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js" type="text/javascript"></script>
</body>
</html>
