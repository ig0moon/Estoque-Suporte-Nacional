<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Estoque</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-muted: #6b7280;
    --accent: #185FA5;
    --accent-hover: #0C447C;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --warning-bg: #fffbeb;
    --warning-text: #92400e;
    --success-bg: #f0fdf4;
    --success-text: #166534;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Layout */
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem; }
  
  /* Esconde o app principal antes do login */
  #app-content { display: none; }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: .875rem 1.25rem;
    display: flex;
    align-items: center;
    gap: .75rem;
  }
  header svg { color: var(--accent); flex-shrink: 0; }
  header h1 { font-size: 16px; font-weight: 600; color: var(--text); flex: 1; }
  header span { font-size: 13px; color: var(--text-muted); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
  }
  .stat .label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .stat .value { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat .value.warn { color: #d97706; }
  .stat .value.danger { color: var(--danger); }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .toolbar-left { display: flex; align-items: center; gap: 8px; flex: 1; }

  input[type="text"].search, input[type="email"], input[type="password"] {
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  input[type="text"].search { width: 220px; }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(24,95,165,.12); }
  input::placeholder { color: var(--text-muted); }

  select.search {
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    background: var(--surface);
    outline: none;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .btn:hover { background: #f3f4f6; }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn.sm { padding: 4px 9px; font-size: 12px; }
  .btn.icon-btn { padding: 5px 8px; }
  .btn.icon-btn.danger { background: var(--danger-bg); color: var(--danger); border-color: #fca5a5; }
  .btn.icon-btn.danger:hover { background: #fee2e2; }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 10px 14px;
    background: #fafafa;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #f9fafb; }
  td.name { font-weight: 500; }

  /* Badges */
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 999px;
  }
  .badge.ok { background: var(--success-bg); color: var(--success-text); }
  .badge.low { background: var(--warning-bg); color: var(--warning-text); }
  .badge.out { background: var(--danger-bg); color: var(--danger); }

  .actions { display: flex; gap: 4px; }

  /* Empty */
  .empty { padding: 3rem; text-align: center; color: var(--text-muted); }
  .empty svg { display: block; margin: 0 auto 10px; opacity: .35; }

  /* Modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
    backdrop-filter: blur(2px);
  }
  .overlay.hidden { display: none; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,.12);
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }

  .field { margin-bottom: .875rem; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; }
  .field input, .field select {
    width: 100%;
    padding: 8px 10px;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
    font-family: inherit;
  }
  .field input.error { border-color: var(--danger); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; border-top: 1px solid var(--border); padding-top: 1rem; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: #1a1a1a;
    color: #fff;
    font-size: 13px;
    padding: 10px 16px;
    border-radius: var(--radius);
    z-index: 200;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .2s, transform .2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Responsive */
  @media (max-width: 640px) {
    th:nth-child(4), td:nth-child(4),
    th:nth-child(5), td:nth-child(5),
    th:nth-child(6), td:nth-child(6) { display: none; }
    input[type="text"].search { width: 100%; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .toolbar-left { flex-direction: column; }
    .toolbar-right { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  }
</style>
</head>
<body>

<div id="login-screen" class="overlay hidden">
  <div class="modal">
    <h2>Acesso Restrito</h2>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="••••••••">
    </div>
    <button class="btn primary" style="width: 100%; margin-top: 10px;" onclick="fazerLogin()">Entrar no Sistema</button>
  </div>
</div>

<div id="app-content">
  <header>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2"/><path d="M3 8h18v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8z"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
    <h1>Controle de Estoque</h1>
    <span id="header-date"></span>
    <button class="btn sm" onclick="fazerLogout()" style="margin-left: 10px;">Sair</button>
  </header>

  <div class="container">
    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <div class="toolbar-left">
        <input type="text" class="search" id="search" placeholder="🔍 Buscar..." oninput="render()">

        <select id="filter-status" onchange="render()" class="search" style="width:170px">
          <option value="">Todos Status</option>
          <option value="ok">OK</option>
          <option value="low">Estoque Baixo</option>
          <option value="out">Sem Estoque</option>
        </select>

        <select id="filter-cat" onchange="render()" class="search" style="width:170px">
          <option value="">Todas Categorias</option>
        </select>
      </div>
      <div class="toolbar-right" style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="importXLSX()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Importar
        </button>
        <button class="btn" onclick="exportXLSX()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar .xlsx
        </button>
        <button class="btn primary" onclick="openModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Novo item
        </button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Qtd</th>
            <th>Mínimo</th>
            <th>Preço unit.</th>
            <th>Localização</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty hidden" id="empty">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2M8 7V5a2 2 0 0 0-4 0v2"/></svg>
        Nenhum item encontrado
      </div>
    </div>
  </div>
</div>

<div class="overlay hidden" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" role="dialog">
    <h2 id="modal-title">Novo item</h2>
    <div class="field">
      <label for="f-nome">Nome *</label>
      <input id="f-nome" type="text" placeholder="Ex: Cabo HDMI 2m">
    </div>
    <div class="field">
      <label for="f-cat">Categoria</label>
      <input id="f-cat" type="text" placeholder="Ex: Periféricos">
    </div>
    <div class="row2">
      <div class="field">
        <label for="f-qty">Quantidade</label>
        <input id="f-qty" type="number" min="0" placeholder="0">
      </div>
      <div class="field">
        <label for="f-min">Estoque mínimo</label>
        <input id="f-min" type="number" min="0" placeholder="5">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label for="f-price">Preço unit. (R$)</label>
        <input id="f-price" type="number" min="0" step="0.01" placeholder="0,00">
      </div>
      <div class="field">
        <label for="f-loc">Localização</label>
        <input id="f-loc" type="text" placeholder="Ex: Sala TI">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" id="btn-save" onclick="saveItem()">Salvar item</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" style="display:none" accept=".xlsx,.xls" onchange="handleFile(this)">

<script>
  // ==========================================
  // CONFIGURAÇÃO DO SUPABASE (COLE AQUI)
  // ==========================================
  const supabaseUrl = 'https://etijsbxyidgjqjxmhxmr.supabase.co'; 
  const supabaseKey = 'sb_publishable_B0FafSksKHq1yukFmp-Iuw_wfd8H8YP';
  
  const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  // --- Estado ---
  let items = [];
  let editId = null;
  let fileHandle = null;

  // ==========================================
  // AUTENTICAÇÃO E LOGIN
  // ==========================================
  async function verificarSessao() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      iniciarApp();
    } else {
      document.getElementById('login-screen').classList.remove('hidden');
    }
  }

  async function fazerLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-senha').value;
    
    if(!email || !password) return toast('Preencha email e senha');

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    
    if (error) {
      toast('Erro: Credenciais inválidas');
    } else {
      iniciarApp();
    }
  }

  async function fazerLogout() {
    await supabaseClient.auth.signOut();
    location.reload();
  }

  function iniciarApp() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-content').style.display = 'block';
    carregarEstoque();
  }

  // ==========================================
  // BANCO DE DADOS (CRUD)
  // ==========================================
  async function carregarEstoque() {
    toast('Carregando...');
    const { data, error } = await supabaseClient.from('estoque').select('*').order('nome');
    
    if (error) {
      console.error(error);
      toast('Erro ao carregar o estoque');
      return;
    }
    
    items = data || [];
    atualizarCategorias();
    render();
  }

  async function saveItem() {
    const nome = document.getElementById('f-nome').value.trim();
    if (!nome) {
      document.getElementById('f-nome').classList.add('error');
      document.getElementById('f-nome').focus();
      return;
    }

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    const itemData = {
      nome,
      cat: document.getElementById('f-cat').value.trim() || 'Geral',
      qty: parseInt(document.getElementById('f-qty').value) || 0,
      min: parseInt(document.getElementById('f-min').value) || 0,
      price: parseFloat(document.getElementById('f-price').value) || 0,
      loc: document.getElementById('f-loc').value.trim() || '-',
    };

    if (editId) {
      // UPDATE
      const { error } = await supabaseClient.from('estoque').update(itemData).eq('id', editId);
      if (error) toast('Erro ao atualizar');
      else toast('Item atualizado');
    } else {
      // INSERT
      const { error } = await supabaseClient.from('estoque').insert([itemData]);
      if (error) toast('Erro ao adicionar');
      else toast('Item adicionado');
    }

    btn.disabled = false;
    btn.textContent = 'Salvar item';
    
    closeModal();
    carregarEstoque(); 
  }

  async function removeItem(id) {
    const item = items.find(i => i.id === id);
    if (!confirm(`Remover "${item?.nome}" do banco de dados?`)) return;
    
    const { error } = await supabaseClient.from('estoque').delete().eq('id', id);
    
    if (error) {
      toast('Erro ao remover');
    } else {
      toast('Item removido');
      carregarEstoque(); 
    }
  }

  // ==========================================
  // HELPERS E RENDERIZAÇÃO
  // ==========================================
  function status(qty, min) {
    if (qty === 0) return 'out';
    if (qty <= min) return 'low';
    return 'ok';
  }
  function statusLabel(s) {
    return s === 'out' ? 'Sem estoque' : s === 'low' ? 'Estoque baixo' : 'OK';
  }
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  function atualizarCategorias() {
    const select = document.getElementById('filter-cat');
    const categoriaAtual = select.value;
    const categorias = [...new Set(items.map(i => i.cat).filter(Boolean))].sort();
    
    select.innerHTML = '<option value="">Todas Categorias</option>' + 
      categorias.map(cat => `<option value="${cat}">${cat}</option>`).join('');
    select.value = categoriaAtual;
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const statusFiltro = document.getElementById('filter-status').value;
    const categoriaFiltro = document.getElementById('filter-cat').value;

    const list = items.filter(i => {
      const busca = i.nome.toLowerCase().includes(q) || 
                    i.cat.toLowerCase().includes(q) || 
                    (i.loc || '').toLowerCase().includes(q);
      const statusOk = !statusFiltro || status(i.qty, i.min) === statusFiltro;
      const categoriaOk = !categoriaFiltro || i.cat === categoriaFiltro;
      return busca && statusOk && categoriaOk;
    });

    // Stats
    const totalValor = items.reduce((a,i) => a + i.qty * i.price, 0);
    const low = items.filter(i => status(i.qty,i.min) === 'low').length;
    const out = items.filter(i => status(i.qty,i.min) === 'out').length;
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="label">Total de itens</div><div class="value">${items.length}</div></div>
      <div class="stat"><div class="label">Estoque baixo</div><div class="value warn">${low}</div></div>
      <div class="stat"><div class="label">Sem estoque</div><div class="value danger">${out}</div></div>
      <div class="stat"><div class="label">Valor total</div><div class="value">R$&nbsp;${totalValor.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
    `;

    // Table
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty');
    
    if (!list.length) {
      tbody.innerHTML = '';
      empty.classList.remove('hidden');
    } else {
      empty.classList.add('hidden');
      tbody.innerHTML = list.map(i => {
        const s = status(i.qty, i.min);
        return `<tr>
          <td class="name">${esc(i.nome)}</td>
          <td>${esc(i.cat)}</td>
          <td>${i.qty}</td>
          <td>${i.min}</td>
          <td>R$ ${i.price.toFixed(2)}</td>
          <td>${esc(i.loc)}</td>
          <td><span class="badge ${s}">${statusLabel(s)}</span></td>
          <td>
            <div class="actions">
              <button class="btn sm icon-btn" onclick="openModal(${i.id})" title="Editar">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="btn sm icon-btn danger" onclick="removeItem(${i.id})" title="Remover">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1-1v2"/></svg>
              </button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }
  }

  // ==========================================
  // MODAL CONTROLS
  // ==========================================
  function openModal(id) {
    editId = id || null;
    document.getElementById('modal-title').textContent = id ? 'Editar item' : 'Novo item';
    const item = id ? items.find(i => i.id === id) : null;
    
    document.getElementById('f-nome').value = item?.nome || '';
    document.getElementById('f-cat').value = item?.cat || '';
    document.getElementById('f-qty').value = item != null ? item.qty : '';
    document.getElementById('f-min').value = item != null ? item.min : '';
    document.getElementById('f-price').value = item != null ? item.price : '';
    document.getElementById('f-loc').value = item?.loc || '';
    
    document.getElementById('f-nome').classList.remove('error');
    document.getElementById('overlay').classList.remove('hidden');
    setTimeout(() => document.getElementById('f-nome').focus(), 50);
  }

  function closeModal() {
    document.getElementById('overlay').classList.add('hidden');
    editId = null;
  }

  // ==========================================
  // EXPORTAR & IMPORTAR XLSX
  // ==========================================
  async function exportXLSX() {
    try {
      const rows = items.map(i => ({
        Nome: i.nome,
        Categoria: i.cat,
        Quantidade: i.qty,
        Mínimo: i.min,
        Preço: i.price,
        Localização: i.loc
      }));

      const ws = XLSX.utils.json_to_sheet(rows);
      ws['!cols'] = [{ wch: 26 }, { wch: 16 }, { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 16 }];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Estoque');

      const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });

      if (!fileHandle) {
        fileHandle = await window.showSaveFilePicker({
          suggestedName: 'estoque.xlsx',
          types: [{
            description: 'Planilha Excel',
            accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] }
          }]
        });
      }

      const writable = await fileHandle.createWritable();
      await writable.write(excelBuffer);
      await writable.close();

      toast('Arquivo exportado com sucesso!');
    } catch (err) {
      console.error(err);
      toast('Exportação cancelada ou falhou.');
    }
  }

  function importXLSX() { document.getElementById('file-input').click(); }

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = async e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'binary' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws);

        if (!data.length) {
          alert('Planilha vazia ou formato inválido.');
          return;
        }

        if (!confirm('ATENÇÃO: O banco de dados atual será APAGADO e substituído pelos itens da planilha. Continuar?')) return;

        toast('Processando...');

        const novos = data.map(r => ({
          nome: r['Nome'] || r['nome'] || 'Item sem nome',
          cat: r['Categoria'] || r['categoria'] || 'Geral',
          qty: parseInt(r['Quantidade'] || r['quantidade'] || 0),
          min: parseInt(r['Mínimo'] || r['minimo'] || 0),
          price: parseFloat(r['Preço'] || r['preco'] || 0),
          loc: r['Localização'] || r['localizacao'] || '-'
        }));

        const { error: delErr } = await supabaseClient.from('estoque').delete().not('id', 'is', null);
        if (delErr) throw delErr;

        const { error: insErr } = await supabaseClient.from('estoque').insert(novos);
        if (insErr) throw insErr;

        toast(`Sucesso! ${novos.length} itens importados.`);
        carregarEstoque();

      } catch (err) {
        console.error(err);
        alert('Erro ao processar o arquivo. Verifique o console.');
      }
    };

    reader.readAsBinaryString(file);
    input.value = '';
  }

  // ==========================================
  // INICIALIZAÇÃO GERAL
  // ==========================================
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  
  const dataHeader = new Date().toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  document.getElementById('header-date').textContent = dataHeader.charAt(0).toUpperCase() + dataHeader.slice(1);
  
  verificarSessao();
</script>
</body>
