<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./img/nacional.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css">
  <title>Suporte - Nacional</title>
  <script src="js/script.js" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>
  <div id="login-screen" class="overlay">
    <div class="modal">
      <h2>Acesso Restrito</h2>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="••••••••">
      </div>
      <button class="btn primary" style="width: 100%; margin-top: 10px;" onclick="fazerLogin()">Entrar no Sistema</button>
    </div>
  </div>

  <div id="app-content">
    <header>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2"/><path d="M3 8h18v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8z"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
      <h1>Controle de Estoque - Nacional</h1>
      <span id="header-date"></span>
      <button class="btn sm" onclick="fazerLogout()" style="margin-left: 10px;">Sair</button>
    </header>

    <div class="container">
      <div class="stats" id="stats"></div>

      <div class="toolbar">
        <div class="toolbar-left">
          <input type="text" class="search" id="search" placeholder="🔍 Buscar..." oninput="render()">

          <select id="filter-status" onchange="render()" class="search" style="width:170px">
            <option value="">Todos Status</option>
            <option value="ok">OK</option>
            <option value="low">Estoque Baixo</option>
            <option value="out">Sem Estoque</option>
          </select>

          <select id="filter-cat" onchange="render()" class="search" style="width:170px">
            <option value="">Todas Categorias</option>
          </select>
        </div>
        <div class="toolbar-right" style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn" onclick="importXLSX()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Importar
          </button>
          <button class="btn" onclick="exportXLSX()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exportar .xlsx
          </button>
          <button class="btn primary" onclick="openModal()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Novo item
          </button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Categoria</th>
              <th>Qtd</th>
              <th>Mínimo</th>
              <th>Preço unit.</th>
              <th>Localização</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="empty hidden" id="empty">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2M8 7V5a2 2 0 0 0-4 0v2"/></svg>
          Nenhum item encontrado
        </div>
      </div>
    </div>
  </div>

  <div class="overlay hidden" id="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" role="dialog">
      <h2 id="modal-title">Novo item</h2>
      <div class="field">
        <label for="f-nome">Nome *</label>
        <input id="f-nome" type="text" placeholder="Ex: Cabo HDMI 2m">
      </div>
      <div class="field">
        <label for="f-cat">Categoria</label>
        <input id="f-cat" type="text" placeholder="Ex: Periféricos">
      </div>
      <div class="row2">
        <div class="field">
          <label for="f-qty">Quantidade</label>
          <input id="f-qty" type="number" min="0" placeholder="0">
        </div>
        <div class="field">
          <label for="f-min">Estoque mínimo</label>
          <input id="f-min" type="number" min="0" placeholder="5">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label for="f-price">Preço unit. (R$)</label>
          <input id="f-price" type="number" min="0" step="0.01" placeholder="0,00">
        </div>
        <div class="field">
          <label for="f-loc">Localização</label>
          <input id="f-loc" type="text" placeholder="Ex: Sala TI">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">Cancelar</button>
        <button class="btn primary" id="btn-save" onclick="saveItem()">Salvar item</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <input type="file" id="file-input" style="display:none" accept=".xlsx,.xls" onchange="handleFile(this)">

</body>
</html>
